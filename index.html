<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Renombrador Masivo de PDFs</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles/estiloPrincipal.css">
</head>

<body>

    <div class="container-fluid vh-100 overflow-hidden">
        <div class="row h-100">
            <!-- Columna izquierda: renombrador -->
            <div class="col-8 pe-0 h-100 overflow-auto">
                <h1 class="mb-4 text-primary">Renombrador Masivo de PDFs</h1>
                <div class="d-flex justify-content-end mb-3">
                    <a href="extraerNombres.html" class="btn btn-warning">
                        Extractor de nombres
                    </a>
                </div>
                <!-- Paso 1: Selección -->
                <div class="card mb-4 shadow-sm">
                    <div class="card-header bg-white">
                        <h2 class="h5 mb-0">1. Selecciona tus archivos PDF</h2>
                    </div>
                    <div class="card-body">
                        <input id="inputsEntradaArchivos" type="file" class="form-control" accept="application/pdf"
                            multiple />
                        <ul id="listaArchivosOriginal" class="list-group list-group-flush mt-3"></ul>
                        <button id="btnRenombrar" class="btn btn-primary mt-3" disabled>
                            Renombrar todos los archivos
                        </button>
                        <!-- GIF de carga -->
                        <div id="loading" class="text-center my-3" style="display: none;">
                            <img src="espera.gif" alt="Procesando…" class="img-fluid rounded-circle"
                                style="width: 60px;" />
                        </div>
                        <!-- Mensajes de estado -->
                        <div id="output" class="alert alert-info mt-3" role="alert" style="display: none;"></div>
                    </div>
                </div>
                <!-- Paso 2: Vista previa & Editar nombres -->
                <div class="card mb-4 shadow-sm">
                    <div class="card-header bg-white">
                        <h2 class="h5 mb-0">2. Vista previa &amp; Editar nombres</h2>
                    </div>
                    <div class="card-body">
                        <ul id="listaRenombrada" class="list-group list-group-flush"></ul>
                        <button id="btnConfirmar" class="btn btn-success mt-3" disabled>
                            Confirmar y guardar
                        </button>
                    </div>
                </div>
            </div>
            <!-- Columna derecha: panel de visualización -->
            <div class="col-4 ps-0 border-start d-flex flex-column h-100 viewer-panel">
                <div class="p-3 border-bottom viewer-header">
                    <h5 class="mb-0 viewer-title">Visor de PDF</h5>
                </div>
                <iframe id="pdfViewerIframe" class="flex-grow-1 viewer-frame"></iframe>
            </div>
        </div>
    </div>
    <footer class="text-center text-muted py-2">
        Renombrador Masivo de PDFs — CesarJam® - Versión 1.0.1
        <div class="form-check form-switch d-inline-block ms-3">
            <button id="toggleDarkMode" class="btn btn-sm btn-outline-secondary ms-2">🌙 Modo oscuro</button>
        </div>
    </footer>
    <!-- pdf.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.13.216/pdf.min.js"></script>
    <!-- tesseract.js -->
    <script src="https://unpkg.com/tesseract.js@2.1.5/dist/tesseract.min.js"></script>
    <script src="functions/ocrv2.js"></script>
    <!-- Tu script de lógica OCR y renombrado -->
    <script src="functions/events.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>

    <!-- Toasts -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1080;">
        <div id="successToast" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="polite"
            aria-atomic="true" data-bs-delay="2000">
            <div class="d-flex">
                <div id="successToastBody" class="toast-body">
                    ✅ Operación exitosa.
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                    aria-label="Cerrar"></button>
            </div>
        </div>
    </div>
</body>

</html>
